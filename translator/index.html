<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="main-container">
        <nav class="nav-panel">
            <div class="logo">LinguaPlay</div>
            <ul>
                <li><a href="#" class="active">Translator</a></li>
                <li><a href="#">Dictionary</a></li>
                <li><a href="#">Games</a></li>
                <li><a href="#">Profile</a></li>
            </ul>
        </nav>
        <main class="content-area">
            <div class="layout-container">
                <div class="main-content">
                    <section class="translation-sections">
                        <div class="panel input-panel">
                            <div class="panel-body">
                                <div class="search-box">
                                    <div class="search-tools">
                                        <div class="language-dropdown">
                                            <button type="button" class="tool-button" id="langBtn" aria-label="Select language">
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <circle cx="12" cy="12" r="10"/>
                                                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                                                </svg>
                                                <span class="lang-code">HY</span>
                                                <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                            </button>
                                            <ul class="language-menu hidden" id="langMenu">
                                                <li data-lang="hy" class="active">Armenian (Eastern)</li>
                                                <li data-lang="ru">Russian</li>
                                                <li data-lang="es">Spanish</li>
                                                <li data-lang="fr">French</li>
                                            </ul>
                                        </div>
                                        <button type="button" class="tool-button" id="keyboardToggle" aria-label="Toggle keyboard">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <rect x="2" y="4" width="20" height="14" rx="2"/>
                                                <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h.01M14 12h.01M18 12h.01M8 16h8"/>
                                            </svg>
                                        </button>
                                    </div>
                                    <input 
                                        type="text" 
                                        class="search-input" 
                                        placeholder="Type in a new word"
                                        id="searchInput"
                                    >
                                    <button class="search-button" id="searchBtn" type="button">Search</button>
                                </div>
                            </div>
                        </div>

                        <div class="panel translation-panel">
                            <div class="panel-body">
                                <div class="translation-block">
                                    <span class="value source-word"></span>
                                    <span class="value translated-word"></span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div class="panel suggestions-panel">
                        <div class="panel-header">Similar Words</div>
                        <div class="panel-body">
                            <ul class="chips" aria-label="Similar words suggestions">
                            </ul>
                        </div>
                    </div>

                    <div class="panel images-panel">
                        <div class="panel-body">
                            <ul class="image-list" aria-label="Related images">
                                <li class="image-item" aria-label="Mock image 1"></li>
                                <li class="image-item" aria-label="Mock image 2"></li>
                                <li class="image-item" aria-label="Mock image 3"></li>
                                <li class="image-item" aria-label="Mock image 4"></li>
                                <li class="image-item" aria-label="Mock image 5"></li>
                            </ul>
                        </div>
                    </div>

                    <button type="button" class="primary-button" id="makeCardBtn">Make a card</button>

                    <div class="panel card-panel hidden" id="cardPanel">
                        <div class="panel-header">New Card</div>
                        <div class="panel-body">
                            <div class="card-template">
                                <div class="card-word source-card-word">—</div>
                                <div class="card-word translated-card-word">—</div>
                                <div class="card-image-placeholder"></div>
                                <button type="button" class="primary-button" id="saveCardBtn">Save Card</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="armenianKeyboard" class="keyboard hidden">
                        <div class="keyboard-row">
                            <button type="button" class="key">ա</button>
                            <button type="button" class="key">բ</button>
                            <button type="button" class="key">գ</button>
                            <button type="button" class="key">դ</button>
                            <button type="button" class="key">ե</button>
                            <button type="button" class="key">զ</button>
                            <button type="button" class="key">է</button>
                            <button type="button" class="key">ը</button>
                            <button type="button" class="key">թ</button>
                            <button type="button" class="key">ժ</button>
                        </div>
                        <div class="keyboard-row">
                            <button type="button" class="key">ի</button>
                            <button type="button" class="key">լ</button>
                            <button type="button" class="key">խ</button>
                            <button type="button" class="key">ծ</button>
                            <button type="button" class="key">կ</button>
                            <button type="button" class="key">հ</button>
                            <button type="button" class="key">ձ</button>
                            <button type="button" class="key">ղ</button>
                            <button type="button" class="key">ճ</button>
                        </div>
                        <div class="keyboard-row">
                            <button type="button" class="key">մ</button>
                            <button type="button" class="key">յ</button>
                            <button type="button" class="key">ն</button>
                            <button type="button" class="key">շ</button>
                            <button type="button" class="key">ո</button>
                            <button type="button" class="key">չ</button>
                            <button type="button" class="key">պ</button>
                            <button type="button" class="key">ջ</button>
                            <button type="button" class="key">ռ</button>
                        </div>
                        <div class="keyboard-row">
                            <button type="button" class="key">ս</button>
                            <button type="button" class="key">վ</button>
                            <button type="button" class="key">տ</button>
                            <button type="button" class="key">ր</button>
                            <button type="button" class="key">ց</button>
                            <button type="button" class="key">ւ</button>
                            <button type="button" class="key">փ</button>
                            <button type="button" class="key">ք</button>
                            <button type="button" class="key">օ</button>
                            <button type="button" class="key">ֆ</button>
                            <button type="button" class="key">և</button>
                        </div>
                        <div class="keyboard-row">
                            <button type="button" class="key shift-key">Shift</button>
                            <button type="button" class="key wide space-key">Space</button>
                        </div>
                    </div>
        </main>
    </div>

    <script type="module" src="./dist/index.js"></script>
</body>
</html>
